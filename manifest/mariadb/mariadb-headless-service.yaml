apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: keycloak
spec:
  selector:
    app: mariadb
  ports:
  - port: 3306
    targetPort: 3306
    name: mysql
  type: ClusterIP
  # This service will load balance between master and slave
  # For Keycloak, you may want to prefer the master for writes
