apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-slave
  namespace: keycloak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mariadb
      role: slave
  template:
    metadata:
      labels:
        app: mariadb
        role: slave
    spec:
      initContainers:
      - name: wait-for-master
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          echo "Waiting for MariaDB master to be ready..."
          until nc -z mariadb-master.keycloak.svc.cluster.local 3306; do
            echo "Waiting for master..."
            sleep 5
          done
          echo "Master is ready!"
      containers:
      - name: mariadb
        image: rhel8/mariadb-103
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: mariadb-root-password
        - name: MARIADB_REPLICATION_USER
          value: "replication"
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: mariadb-replication-password
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
        - name: mariadb-config
          mountPath: /etc/mysql/conf.d/custom.cnf
          subPath: slave.cnf
        - name: mariadb-config
          mountPath: /docker-entrypoint-initdb.d/init.sql
          subPath: init-slave.sql
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -p$(MARIADB_ROOT_PASSWORD)
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -p$(MARIADB_ROOT_PASSWORD)
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 1
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb-slave-pvc
      - name: mariadb-config
        configMap:
          name: mariadb-config
